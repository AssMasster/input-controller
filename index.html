<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Тест универсального контроллера ввода</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <h1>Универсальный контроллер ввода (клавиатура)</h1>
    <div id="container">
        <div id="controls">
            <div class="button-panel">
                <h3>Состояние</h3>
                <div><span class="indicator">enabled:</span> <span id="enabled-indicator" class="badge">false</span></div>
                <div><span class="indicator">focused:</span> <span id="focused-indicator" class="badge">true</span></div>
                <div><span class="indicator">left:</span> <span id="left-active" class="badge">false</span></div>
                <div><span class="indicator">right:</span> <span id="right-active" class="badge">false</span></div>
                <div><span class="indicator">jump:</span> <span id="jump-active" class="badge">false</span></div>
            </div>

            <div class="button-panel">
                <h3>Управление контроллером</h3>
                <button id="btn-attach">Attach</button>
                <button id="btn-detach">Detach</button>
                <button id="btn-enable">Enable controller</button>
                <button id="btn-disable">Disable controller</button>
                <button id="btn-focus-target">Focus target</button>
            </div>

            <div class="button-panel">
                <h3>Активности</h3>
                <button id="btn-bind-jump">Bind jump (пробел)</button>
                <button id="btn-enable-left">Enable left</button>
                <button id="btn-disable-left">Disable left</button>
                <button id="btn-enable-jump">Enable jump</button>
                <button id="btn-disable-jump">Disable jump</button>
            </div>

            <div class="button-panel">
                <h3>Лог событий</h3>
                <div id="log"></div>
            </div>
        </div>

        <div id="visualization">
            <h3>Интерактивный объект</h3>
            <div id="controller-target" tabindex="0">
                <div id="player"></div>
                <p style="margin-top: 180px; color: #888;">Кликните сюда, затем используйте стрелки / WASD / пробел</p>
            </div>
        </div>
    </div>

    <script src="input-controller.js"></script>
    <script src="input-controller-test.js"></script>
</body>

</html>
